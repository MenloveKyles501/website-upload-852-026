  <main>
    
    <section class="py-10 sm:py-12">
      <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
        <div class="rounded-[2rem] bg-white p-6 shadow-sm sm:p-8">
          <h1 class="text-3xl font-bold text-slate-900 sm:text-4xl">站内搜索</h1>
          <p class="mt-3 max-w-3xl text-base leading-7 text-slate-600">支持标题、年份、地区、类型、关键词、简介与标签搜索。</p>
          <div class="mt-6 grid gap-3 lg:grid-cols-[1fr_220px_180px]">
            <input id="q" type="search" placeholder="输入影片名称、地区、类型或关键词…" class="w-full rounded-2xl border border-slate-200 px-5 py-4 text-base outline-none ring-0 focus:border-blue-500">
            <select id="typeFilter" class="rounded-2xl border border-slate-200 px-4 py-4 text-base outline-none focus:border-blue-500">
              <option value="">全部类型</option>
            </select>
            <select id="yearFilter" class="rounded-2xl border border-slate-200 px-4 py-4 text-base outline-none focus:border-blue-500">
              <option value="">全部年份</option>
            </select>
          </div>
        </div>
        <div class="mt-8 flex items-center justify-between gap-4">
          <h2 class="text-2xl font-bold text-slate-900">搜索结果</h2>
          <div id="count" class="text-sm text-slate-500"></div>
        </div>
        <div id="results" class="mt-6 grid gap-6 sm:grid-cols-2 xl:grid-cols-4"></div>
      </div>
    </section>
    <script src="assets/search-data.js"></script>
    <script>
      (function(){
        const qEl = document.getElementById('q');
        const typeEl = document.getElementById('typeFilter');
        const yearEl = document.getElementById('yearFilter');
        const results = document.getElementById('results');
        const count = document.getElementById('count');
        const data = window.MOVIE_DATA || [];
        const types = [...new Set(data.map(x => x.type))].sort((a,b)=>a.localeCompare(b,'zh-CN'));
        const years = [...new Set(data.map(x => x.year))].sort((a,b)=>b-a);
        types.forEach(t => typeEl.insertAdjacentHTML('beforeend', `<option value="${t}">${t}</option>`));
        years.forEach(y => yearEl.insertAdjacentHTML('beforeend', `<option value="${y}">${y}</option>`));
        const params = new URLSearchParams(location.search);
        qEl.value = params.get('q') || '';
        function render(){
          const q = qEl.value.trim().toLowerCase();
          const t = typeEl.value;
          const y = yearEl.value;
          const matched = data.filter(x => {
            if (t && x.type !== t) return false;
            if (y && x.year !== y) return false;
            if (!q) return true;
            return [x.title,x.type,x.region,x.year,x.genre,(x.tags||[]).join(','),x.one_line,x.summary,x.review].join(' ').toLowerCase().includes(q);
          });
          results.innerHTML = matched.slice(0, 200).map(x => x.html).join('');
          count.textContent = `共找到 ${matched.length} 条，当前显示前 ${Math.min(matched.length,200)} 条`;
        }
        qEl.addEventListener('input', render);
        typeEl.addEventListener('change', render);
        yearEl.addEventListener('change', render);
        render();
      })();
    </script>
    
  </main>
